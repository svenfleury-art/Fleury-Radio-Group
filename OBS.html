<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FRG Now Playing</title>

<style>
body {
  margin: 0;
  background: transparent;
  font-family: Arial, sans-serif;
}

/* Container */
.player {
  background: linear-gradient(90deg, #2563EB, #1D4ED8);
  color: white;
  padding: 25px 40px;
  border-radius: 20px;
  width: fit-content;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

/* "Jetzt läuft" */
.subtitle {
  font-size: 18px;
  opacity: 0.85;
  margin-bottom: 8px;
}

/* Titel groß */
.title {
  font-size: 32px;
  font-weight: bold;
  line-height: 1.3;
}
</style>
</head>

<body>

<div class="player">
  <div class="subtitle">🎧 Jetzt läuft</div>
  <div class="title" id="song">Lade...</div>
</div>

<script>
async function updateSong() {
  try {
    const res = await fetch("https://api.laut.fm/station/rhywaelle/current_song");
    const data = await res.json();

    const artist = data.artist?.name || "Unbekannt";
    const title = data.title || "Kein Titel";

    document.getElementById("song").innerText =
      `"${title}" von "${artist}"`;
  } catch (e) {
    document.getElementById("song").innerText = "Keine Verbindung";
  }
}

setInterval(updateSong, 10000);
updateSong();
</script>

</body>
</html>
