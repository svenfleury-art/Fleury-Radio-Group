<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Fleury Radio Group</title>

  <link rel="stylesheet" href="style.css">

  <link rel="icon" href="img/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="img/Fleury Radio Group Logo.png">

  <meta name="description" content="FRG – Dini Musik, dini Wälle">
</head>

<body>

  <!-- 🔵 LOADER (optional) -->
  <div id="loader"></div>

  <!-- 🔵 NAV (wird dynamisch geladen) -->
  <div id="nav-slot"></div>

  <!-- 🎧 GLOBAL PLAYER (WICHTIG!) -->
  <div class="frg-player">

    <button id="playBtn" class="play-btn">▶</button>

    <div class="station-switch">
      <button class="station active" data-station="rhywaelle">Rhywälle</button>
      <button class="station" data-station="winterlord">Winterlord</button>
      <button class="station" data-station="rhyrock">RhyRock</button>
    </div>

    <div class="now-playing" id="nowPlaying">Bereit</div>

  </div>

  <!-- 📦 SPA CONTENT CONTAINER -->
  <main id="app"></main>

  <!-- 🍪 FOOTER (dynamisch geladen) -->
  <div id="footer-slot"></div>

  <!-- ⚙️ MAIN SYSTEM -->
  <script src="main.js"></script>

  <!-- 🎧 PLAYER LOGIC -->
  <script src="player.js"></script>

</body>
</html>
