<!DOCTYPE html>
<html lang="de">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Fleury Radio Group</title>

  <meta name="description" content="FRG – Dini Musik, dini Wälle">

  <link rel="icon" href="img/Fleury Radio Group Logo.png">
  <link rel="apple-touch-icon" href="img/Fleury Radio Group Logo.png">

  <link rel="stylesheet" href="style.css">

</head>
<body>

  <!-- 🔥 HEADER SLOT (FEHLT BEI DIR!) -->
  <div id="nav-slot"></div>

  <!-- GLOBAL RADIO -->
  <div class="frg-player">

    <button id="playBtn">▶</button>

    <div class="station-switch">
      <button class="station active" data-station="rhywaelle">Rhywälle</button>
      <button class="station" data-station="winterlord">Winterlord</button>
      <button class="station" data-station="rhyrock">RhyRock</button>
    </div>

    <div id="nowPlaying">Bereit</div>

    <audio id="audioPlayer"></audio>
  </div>

  <!-- SPA ROOT -->
  <main id="app"></main>

  <!-- 🔥 FOOTER SLOT (FEHLT BEI DIR!) -->
  <div id="footer-slot"></div>

  <script src="main.js" defer></script>
  <script src="radio.js" defer></script>

</body>
</html>
